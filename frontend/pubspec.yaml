name: frontend
description: "ChainTok - On-chain TikTok on Solana"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Video playback
  video_player: ^2.9.3

  # Networking
  http: ^1.3.0

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2
  font_awesome_flutter: ^10.8.0
  share_plus: ^10.1.4

  # Media picker
  image_picker: ^1.1.2

  # Local storage
  shared_preferences: ^2.3.4

  # URL handling (for Phantom deeplinks)
  url_launcher: ^6.3.1
  app_links: ^6.4.0

  # Solana
  solana_mobile_client: ^0.1.2
  solana_web3: ^0.1.3
  crypto: ^3.0.6

  # Utils
  intl: ^0.20.2
  timeago: ^3.7.0

dependency_overrides:
  pinenacl: ^0.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
